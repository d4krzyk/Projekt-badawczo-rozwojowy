services:
  pixelartapp:
    image: texture-api-no-gtk:latest
    build:
      context: .
      dockerfile: alt-option.Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    env_file:
      - env.txt
    volumes:
      - .:/app:cached
    stdin_open: true
    tty: true
    command: python3 main_api.py