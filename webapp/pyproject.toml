[tool.flake8]
max-line-length = 99
exclude = [ "*/migrations/*", ]
ignore = ['W503', 'Q000', 'D', 'B902']

[tool.isort]
line_length = 99
src_paths = ["."]
honor_noqa = true
combine_star = true
order_by_type = true
force_single_line = true
known_first_party = ["webapp"]
sections = [ "FUTURE", "STDLIB", "THIRDPARTY", "FIRSTPARTY", "LOCALFOLDER" ]
import_heading_stdlib = "Standard Library"
import_heading_thirdparty = "3rd-Party"
import_heading_firstparty = "Project"
import_heading_localfolder = "Local"
skip = [ "manage.py" ]
skip_glob = [ "*/migrations/*", ".venv/*", ".conda/*", ".git/*", ".github/*", ".vscode/*", ".pytest_cache/*", "*/__pycache__/*", "*/.mypy_cache/*", ".idea/*", "*postgres_data/*" ]